name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release --logger trx

    - name: Publish (self-contained single-file)
      run: |
        dotnet publish src/DCSManager.App/DCSManager.App.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o publish/
      if: startsWith(github.ref, 'refs/tags/')

    - name: Copy catalog to publish
      run: Copy-Item catalog/plugins.json publish/
      if: startsWith(github.ref, 'refs/tags/')

    - name: Build Inno Setup installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer/setup.iss
        options: /DAppVersion=${{ github.ref_name }}
      if: startsWith(github.ref, 'refs/tags/')

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: installer/dist/DCSManager-Setup-*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
